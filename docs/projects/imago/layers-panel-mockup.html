<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>imago — layers panel (fluid grouping) mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <style>
      :root {
        --bg: #120e18;
        --bg-elev: #1a1422;
        --surface: #1b1626;
        --surface-2: #140f1d;
        --surface-3: #241d33;
        --divider: #241d33;
        --edge: #2e2640;
        --edge-strong: #3a3050;
        --edge-hover: #4a3f63;
        --ink: #e2e8f0;
        --ink-strong: #f5f3ff;
        --muted: #94a3b8;
        --faint: #64748b;
        --accent: #7c3aed;
        --accent-hover: #8b5cf6;
        --accent-ink: #c4b5fd;
        --accent-fg: #ffffff;
        --attention: #f59e0b;
        --attention-ink: #fcd34d;
        --capture: #d946ef;
        --capture-ink: #f0abfc;
        --positive: #34d399;
        --like: #fb7185;
      }
      body {
        background: radial-gradient(
          120% 120% at 50% -10%,
          var(--bg-elev) 0%,
          var(--bg) 60%
        );
        color: var(--ink);
        font-family:
          ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      .panel {
        background: var(--surface);
        border: 1px solid var(--edge);
      }
      .well {
        background: var(--surface-2);
        border: 1px solid var(--edge);
      }
      .row {
        border: 1px solid transparent;
        border-radius: 0.5rem;
      }
      .row:hover {
        background: var(--surface-3);
      }
      .row-sel {
        background: color-mix(in oklab, var(--accent) 22%, var(--surface));
        border-color: var(--accent);
      }
      .child-sel {
        background: color-mix(in oklab, var(--accent) 16%, var(--surface));
        border-color: color-mix(in oklab, var(--accent) 60%, transparent);
      }
      .icbtn {
        color: var(--faint);
        border-radius: 0.375rem;
      }
      .icbtn:hover {
        color: var(--ink);
        background: var(--surface-3);
      }
      .chip {
        background: var(--surface-3);
        border: 1px solid var(--edge);
        color: var(--muted);
      }
      .thumb {
        border: 1px solid var(--edge-strong);
        border-radius: 0.3rem;
      }
      .teach {
        background: color-mix(in oklab, var(--accent) 12%, var(--surface-2));
        border: 1px solid color-mix(in oklab, var(--accent) 35%, transparent);
      }
      .toolbtn {
        background: var(--surface-2);
        border: 1px solid var(--edge);
        color: var(--muted);
      }
      .toolbtn.active {
        background: color-mix(in oklab, var(--accent) 28%, var(--surface));
        border-color: var(--accent);
        color: var(--accent-ink);
      }
      [x-cloak] {
        display: none !important;
      }
    </style>
  </head>

  <body class="min-h-screen" x-data="app" x-cloak>
    <!-- ── state switcher (amber bar) ──────────────────────────── -->
    <div
      class="sticky top-0 z-20 border-b"
      style="background: #2a1c05; border-color: #5a3d08"
    >
      <div class="px-4 py-1 text-[11px] font-medium" style="color: #fcd34d">
        imago · layers panel — fluid grouping model
        <span style="color: #b4862a"
          >· throwaway mockup, not production · click states ↓</span
        >
      </div>
      <div class="px-3 pb-2 flex flex-wrap items-center gap-1.5">
        <template x-for="s in states" :key="s.id">
          <button
            @click="select(s.id)"
            :class="state === s.id ? 'bg-amber-600 text-white border-amber-600' : 'bg-slate-800/60 text-slate-300 border-slate-600/60'"
            class="text-[11px] px-2.5 py-1 rounded border font-medium transition-colors"
            x-text="s.label"
          ></button>
        </template>
      </div>
    </div>

    <!-- ── teaching caption ────────────────────────────────────── -->
    <div class="px-4 pt-3">
      <div
        class="teach rounded-lg px-3 py-2 text-[13px] leading-snug"
        style="color: var(--accent-ink)"
      >
        <span class="font-semibold" x-text="cur.title"></span>
        <span style="color: var(--muted)" x-text="' — ' + cur.note"></span>
      </div>
    </div>

    <!-- ── imago shell: toolbar · canvas · layers panel ────────── -->
    <div class="p-4 flex gap-3 items-stretch" style="height: calc(100vh - 132px)">
      <!-- left tool rail (decorative, for context) -->
      <div
        class="panel rounded-xl p-1.5 flex flex-col gap-1.5"
        style="width: 52px"
      >
        <template
          x-for="t in ['mouse-pointer-2','pen-tool','arrow-up-right','minus','square','circle','map-pin']"
          :key="t"
        >
          <button
            class="toolbtn rounded-lg grid place-items-center"
            :class="t === cur.activeTool ? 'active' : ''"
            style="width: 40px; height: 40px"
          >
            <i :data-lucide="t" class="w-4 h-4 pointer-events-none"></i>
          </button>
        </template>
        <div class="flex-1"></div>
        <div
          class="text-[9px] text-center leading-tight"
          style="color: var(--faint)"
        >
          tool<br />rail
        </div>
      </div>

      <!-- center: the canvas -->
      <div class="flex-1 panel rounded-xl p-3 flex flex-col min-w-0">
        <div
          class="flex items-center justify-between mb-2 text-[11px]"
          style="color: var(--muted)"
        >
          <span class="font-medium" style="color: var(--ink)">Canvas</span>
          <span class="chip rounded px-2 py-0.5" x-text="cur.zoom || '100% · 1:1'"></span>
        </div>

        <!-- stage -->
        <div class="flex-1 well rounded-lg relative overflow-hidden grid place-items-center">
          <div class="relative" style="width: 460px; max-width: 100%; aspect-ratio: 4/3">
            <!-- base photo -->
            <div
              class="absolute inset-0 rounded-md grid place-items-center text-center"
              style="
                background:
                  linear-gradient(145deg, #2b3a67 0%, #4a3a6b 45%, #6b3a52 100%);
                box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
              "
            >
              <div style="color: rgba(255, 255, 255, 0.55)" class="text-[12px]">
                <i data-lucide="image" class="w-7 h-7 mx-auto mb-1 opacity-70"></i>
                background image
              </div>
            </div>

            <!-- marks overlay — SVG built as a string, injected via x-html
                 (Alpine x-for/x-if on <template> does NOT work inside <svg>) -->
            <div class="absolute inset-0" x-html="canvasSvg()"></div>

            <!-- hidden-layer hint -->
            <template x-if="cur.hiddenHint">
              <div
                class="absolute left-2 bottom-2 text-[10px] px-2 py-1 rounded"
                style="
                  background: rgba(0, 0, 0, 0.55);
                  color: var(--faint);
                  border: 1px solid var(--edge);
                "
              >
                <i data-lucide="eye-off" class="w-3 h-3 inline-block -mt-0.5"></i>
                dashed layer is hidden — excluded from the flatten
              </div>
            </template>
          </div>
        </div>

        <!-- handoff strip -->
        <div class="mt-2 flex items-center justify-between">
          <div class="text-[11px]" style="color: var(--faint)">
            <span x-text="cur.flattenNote"></span>
          </div>
          <button
            class="text-[11px] px-3 py-1.5 rounded-lg font-medium flex items-center gap-1.5"
            style="background: var(--accent); color: var(--accent-fg)"
          >
            <i data-lucide="send" class="w-3.5 h-3.5 pointer-events-none"></i>
            Take to conversation
            <span class="opacity-80">(flattens visible)</span>
          </button>
        </div>
      </div>

      <!-- right: layers panel -->
      <div class="panel rounded-xl flex flex-col" style="width: 304px">
        <!-- panel header -->
        <div
          class="flex items-center justify-between px-3 py-2 border-b"
          style="border-color: var(--divider)"
        >
          <div class="flex items-center gap-2">
            <i data-lucide="layers" class="w-4 h-4" style="color: var(--accent-ink)"></i>
            <span class="text-[13px] font-semibold" style="color: var(--ink-strong)"
              >Layers</span
            >
          </div>
          <div class="flex items-center gap-0.5">
            <button
              class="icbtn p-1.5 disabled:opacity-30"
              :disabled="selCount < 2"
              :title="selCount < 2 ? 'Select 2+ to group' : 'Group selection'"
            >
              <i data-lucide="group" class="w-4 h-4 pointer-events-none"></i>
            </button>
            <button class="icbtn p-1.5" title="New layer">
              <i data-lucide="plus" class="w-4 h-4 pointer-events-none"></i>
            </button>
          </div>
        </div>

        <!-- active-layer indicator -->
        <div
          class="px-3 py-1.5 text-[11px] flex items-center gap-1.5 border-b"
          style="border-color: var(--divider); color: var(--muted)"
        >
          <i data-lucide="pencil" class="w-3 h-3" style="color: var(--accent-ink)"></i>
          new marks drop into
          <span
            class="font-medium px-1.5 py-0.5 rounded"
            style="background: var(--surface-3); color: var(--accent-ink)"
            x-text="cur.activeLayer"
          ></span>
        </div>

        <!-- the rows -->
        <div class="flex-1 overflow-y-auto p-1.5 space-y-1">
          <template x-for="row in cur.rows" :key="row.id">
            <div>
              <!-- main row -->
              <div
                class="row flex items-center gap-1.5 px-1.5 py-1.5"
                :class="row.sel ? 'row-sel' : ''"
              >
                <i
                  data-lucide="grip-vertical"
                  class="w-3.5 h-3.5 shrink-0 cursor-grab"
                  style="color: var(--faint)"
                ></i>

                <!-- expand chevron (groups only) -->
                <button
                  class="icbtn p-0.5 shrink-0"
                  :class="row.children ? '' : 'invisible'"
                  @click="row.open = !row.open"
                >
                  <i
                    :data-lucide="row.open ? 'chevron-down' : 'chevron-right'"
                    class="w-3.5 h-3.5 pointer-events-none"
                  ></i>
                </button>

                <!-- thumb -->
                <div
                  class="thumb shrink-0 grid place-items-center"
                  style="width: 26px; height: 26px"
                  :style="`background:${row.swatch}`"
                >
                  <i
                    :data-lucide="row.icon"
                    class="w-3.5 h-3.5 pointer-events-none"
                    style="color: rgba(255, 255, 255, 0.85)"
                  ></i>
                </div>

                <!-- name + meta -->
                <div class="min-w-0 flex-1">
                  <div
                    class="text-[12px] truncate"
                    :style="`color:${row.sel ? 'var(--accent-ink)' : 'var(--ink)'}`"
                    x-text="row.name"
                  ></div>
                  <div
                    class="text-[10px] truncate"
                    style="color: var(--faint)"
                    x-text="row.meta"
                  ></div>
                </div>

                <!-- rotate affordance (image layers) -->
                <button
                  class="icbtn p-1 shrink-0"
                  :class="row.rotatable ? '' : 'invisible'"
                  title="Rotate"
                >
                  <i data-lucide="rotate-cw" class="w-3.5 h-3.5 pointer-events-none"></i>
                </button>

                <!-- eye -->
                <button
                  class="icbtn p-1 shrink-0"
                  :style="row.hidden ? 'color:var(--attention-ink)' : ''"
                  @click="row.hidden = !row.hidden"
                  title="Visibility (controls handoff)"
                >
                  <i
                    :data-lucide="row.hidden ? 'eye-off' : 'eye'"
                    class="w-3.5 h-3.5 pointer-events-none"
                  ></i>
                </button>

                <!-- lock -->
                <button
                  class="icbtn p-1 shrink-0"
                  :style="row.locked ? 'color:var(--attention-ink)' : ''"
                  @click="row.locked = !row.locked"
                  title="Lock"
                >
                  <i
                    :data-lucide="row.locked ? 'lock' : 'unlock'"
                    class="w-3.5 h-3.5 pointer-events-none"
                  ></i>
                </button>
              </div>

              <!-- children -->
              <template x-if="row.children && row.open">
                <div class="ml-7 mt-0.5 space-y-0.5">
                  <template x-for="ch in row.children" :key="ch.id">
                    <div
                      class="row flex items-center gap-2 pl-2 pr-1.5 py-1"
                      :class="ch.sel ? 'child-sel' : ''"
                    >
                      <i
                        :data-lucide="ch.icon"
                        class="w-3 h-3 shrink-0"
                        :style="`color:${ch.sel ? 'var(--accent-ink)' : 'var(--faint)'}`"
                      ></i>
                      <span
                        class="text-[11px] truncate flex-1"
                        :style="`color:${ch.sel ? 'var(--accent-ink)' : 'var(--muted)'}`"
                        x-text="ch.name"
                      ></span>
                      <template x-if="ch.sel">
                        <span
                          class="text-[9px] px-1 py-0.5 rounded"
                          style="background: var(--accent); color: var(--accent-fg)"
                          >selected</span
                        >
                      </template>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>
        </div>

        <!-- panel footer hint -->
        <div
          class="px-3 py-2 border-t text-[10px] leading-snug"
          style="border-color: var(--divider); color: var(--faint)"
        >
          top of list = front of stack · drag
          <i data-lucide="grip-vertical" class="w-2.5 h-2.5 inline-block"></i> to
          reorder · eye <i data-lucide="eye" class="w-2.5 h-2.5 inline-block"></i> =
          include in handoff
        </div>
      </div>
    </div>

    <script>
      // ── geometry helpers ──────────────────────────────────────
      function bboxOfArrow(a, pad = 14) {
        const x = Math.min(a.x1, a.x2) - pad,
          y = Math.min(a.y1, a.y2) - pad;
        return {
          x,
          y,
          w: Math.abs(a.x2 - a.x1) + pad * 2,
          h: Math.abs(a.y2 - a.y1) + pad * 2,
        };
      }

      const photoOnly = [];
      const sketchStrokes = [
        { id: "s1", type: "stroke", d: "M70,90 q20,-30 45,-5 t40,10 t38,-18" },
        { id: "s2", type: "stroke", d: "M85,150 q30,20 60,5 t55,-12" },
        { id: "s3", type: "stroke", d: "M110,200 q25,-22 55,-2 t48,12" },
        { id: "s4", type: "stroke", d: "M210,70 q18,28 40,12 t36,-20" },
        { id: "s5", type: "stroke", d: "M250,180 q22,-18 44,4 t30,16" },
      ];
      const threeArrows = [
        { id: "a1", type: "arrow", x1: 60, y1: 60, x2: 150, y2: 120 },
        { id: "a2", type: "arrow", x1: 330, y1: 70, x2: 240, y2: 130 },
        { id: "a3", type: "arrow", x1: 200, y1: 250, x2: 210, y2: 160 },
      ];

      document.addEventListener("alpine:init", () => {
        Alpine.data("app", () => ({
          state: "fresh",

          states: [
            {
              id: "fresh",
              label: "1 · Fresh canvas",
              title: "Two layers to start.",
              note: "The dragged-in image is the Background; a default Annotations layer sits on top, ready to receive marks. Nothing drawn yet.",
              activeTool: "mouse-pointer-2",
              activeLayer: "Annotations",
              flattenNote: "Flatten would send: background image only.",
              marks: [...photoOnly],
              rows: [
                { id: "ann", name: "Annotations", meta: "empty · active", icon: "pen-tool", swatch: "var(--surface-3)" },
                { id: "bg", name: "Background", meta: "image", icon: "image", swatch: "linear-gradient(145deg,#2b3a67,#6b3a52)", locked: true },
              ],
            },
            {
              id: "sketch",
              label: "2 · Sketch accretes",
              title: "5 strokes → one row.",
              note: "Pen strokes from one drawing session accrete into the active Sketch group — a freeform drawing is ONE manageable layer, not five stroke rows. (Expand it: the strokes are still individual underneath.)",
              activeTool: "pen-tool",
              activeLayer: "Sketch 1",
              flattenNote: "Flatten would send: background + the sketch, merged to pixels.",
              marks: [...sketchStrokes],
              rows: [
                {
                  id: "sk1", name: "Sketch 1", meta: "5 strokes · active", icon: "pen-tool",
                  swatch: "color-mix(in oklab,var(--attention) 35%,var(--surface-2))",
                  open: false,
                  children: [
                    { id: "c1", name: "Stroke 1", icon: "spline" },
                    { id: "c2", name: "Stroke 2", icon: "spline" },
                    { id: "c3", name: "Stroke 3", icon: "spline" },
                    { id: "c4", name: "Stroke 4", icon: "spline" },
                    { id: "c5", name: "Stroke 5", icon: "spline" },
                  ],
                },
                { id: "bg", name: "Background", meta: "image", icon: "image", swatch: "linear-gradient(145deg,#2b3a67,#6b3a52)", locked: true },
              ],
            },
            {
              id: "arrows",
              label: "3 · Arrows stay discrete",
              title: "3 arrows → 3 rows.",
              note: "Discrete objects (arrow / shape / note) each stand alone as a group-of-one, so you can grab and manipulate any single one. Opposite default from the pen — same model.",
              activeTool: "arrow-up-right",
              activeLayer: "Annotations",
              flattenNote: "Flatten would send: background + 3 arrows, merged.",
              marks: [...threeArrows],
              rows: [
                { id: "ar1", name: "Arrow 1", meta: "annotation", icon: "arrow-up-right", swatch: "color-mix(in oklab,var(--attention) 35%,var(--surface-2))" },
                { id: "ar2", name: "Arrow 2", meta: "annotation", icon: "arrow-up-right", swatch: "color-mix(in oklab,var(--attention) 35%,var(--surface-2))" },
                { id: "ar3", name: "Arrow 3", meta: "annotation", icon: "arrow-up-right", swatch: "color-mix(in oklab,var(--attention) 35%,var(--surface-2))" },
                { id: "bg", name: "Background", meta: "image", icon: "image", swatch: "linear-gradient(145deg,#2b3a67,#6b3a52)", locked: true },
              ],
            },
            {
              id: "grouped",
              label: "4 · Group on demand",
              title: "Select 2, group them.",
              note: "Multi-select two arrows and hit Group → they collapse into one row you can move / hide / reorder as a unit. Reversible (ungroup any time). This operation is what makes the model fluid.",
              activeTool: "mouse-pointer-2",
              activeLayer: "Annotations",
              flattenNote: "Flatten unaffected — grouping is organization, not pixels.",
              marks: [
                { ...threeArrows[0] },
                { ...threeArrows[1] },
                { ...threeArrows[2] },
                { id: "gbox", type: "marker", groupbox: { x: 46, y: 46, w: 300, h: 100 } },
              ],
              rows: [
                {
                  id: "grp1", name: "Group 1", meta: "2 arrows", icon: "group",
                  swatch: "color-mix(in oklab,var(--accent) 35%,var(--surface-2))",
                  open: false,
                  children: [
                    { id: "c1", name: "Arrow 1", icon: "arrow-up-right" },
                    { id: "c2", name: "Arrow 2", icon: "arrow-up-right" },
                  ],
                },
                { id: "ar3", name: "Arrow 3", meta: "annotation", icon: "arrow-up-right", swatch: "color-mix(in oklab,var(--attention) 35%,var(--surface-2))" },
                { id: "bg", name: "Background", meta: "image", icon: "image", swatch: "linear-gradient(145deg,#2b3a67,#6b3a52)", locked: true },
              ],
            },
            {
              id: "inside",
              label: "5 · Still individual",
              title: "Sharing a group ≠ welded.",
              note: "Group 1 is expanded and one arrow is selected — it highlights on the canvas by itself. Co-locating never costs individual control: selection is per-element; grouping only governs z-order, visibility, and lock.",
              activeTool: "mouse-pointer-2",
              activeLayer: "Annotations",
              flattenNote: "Flatten would send: background + all visible arrows, merged.",
              marks: [
                { ...threeArrows[0] },
                { ...threeArrows[1], sel: true, bbox: bboxOfArrow(threeArrows[1]) },
                { ...threeArrows[2] },
              ],
              rows: [
                {
                  id: "grp1", name: "Group 1", meta: "2 arrows", icon: "group",
                  swatch: "color-mix(in oklab,var(--accent) 35%,var(--surface-2))",
                  open: true,
                  children: [
                    { id: "c1", name: "Arrow 1", icon: "arrow-up-right" },
                    { id: "c2", name: "Arrow 2", icon: "arrow-up-right", sel: true },
                  ],
                },
                { id: "ar3", name: "Arrow 3", meta: "annotation", icon: "arrow-up-right", swatch: "color-mix(in oklab,var(--attention) 35%,var(--surface-2))" },
                { id: "bg", name: "Background", meta: "image", icon: "image", swatch: "linear-gradient(145deg,#2b3a67,#6b3a52)", locked: true },
              ],
            },
            {
              id: "collage",
              label: "6 · Collage + handoff",
              title: "Image layers, and the eye controls the handoff.",
              note: "Dropped-in clippings become image layers (rotatable, individually movable). The Scratch notes layer's eye is OFF — dimmed on canvas and excluded from the flatten. Visibility = free per-layer control over what the agent receives.",
              activeTool: "mouse-pointer-2",
              activeLayer: "Annotations",
              zoom: "100% · 1:1",
              hiddenHint: true,
              flattenNote: "Flatten would send: background + 2 image layers, harmonized. Scratch notes excluded (hidden).",
              marks: [
                { id: "im1", type: "image", x: 60, y: 70, w: 130, h: 100, rot: -8, fill: "#1f6f6b", tag: "clipping A" },
                { id: "im2", type: "image", x: 230, y: 120, w: 120, h: 110, rot: 6, fill: "#7a4d2b", tag: "clipping B" },
                { id: "n1", type: "stroke", d: "M70,250 q20,-15 45,0 t40,-4", hidden: true },
              ],
              rows: [
                { id: "scratch", name: "Scratch notes", meta: "2 strokes · hidden", icon: "pen-tool", swatch: "color-mix(in oklab,var(--attention) 30%,var(--surface-2))", hidden: true },
                { id: "clipB", name: "Clipping B", meta: "image · rotated 6°", icon: "image", swatch: "#7a4d2b", rotatable: true },
                { id: "clipA", name: "Clipping A", meta: "image · rotated -8°", icon: "image", swatch: "#1f6f6b", rotatable: true },
                { id: "bg", name: "Background", meta: "image", icon: "image", swatch: "linear-gradient(145deg,#2b3a67,#6b3a52)", locked: true },
              ],
            },
          ],

          get cur() {
            return this.states.find((s) => s.id === this.state);
          },
          get selCount() {
            return this.state === "arrows" ? 2 : 0;
          },
          select(id) {
            this.state = id;
            this.refreshIcons();
          },
          corners(b) {
            return [
              { x: b.x, y: b.y },
              { x: b.x + b.w, y: b.y },
              { x: b.x, y: b.y + b.h },
              { x: b.x + b.w, y: b.y + b.h },
            ];
          },

          // ── build the canvas SVG as a STRING (injected via x-html) ──
          canvasSvg() {
            const defs = `<defs>
              <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="var(--attention)"/></marker>
              <marker id="ahs" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="var(--accent-ink)"/></marker>
            </defs>`;
            const body = (this.cur.marks || []).map((k) => this.markSvg(k)).join("");
            return `<svg viewBox="0 0 400 300" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%">${defs}${body}</svg>`;
          },
          markSvg(k) {
            const op = k.hidden ? 0.18 : 1;
            if (k.type === "image") {
              const tr = k.rot
                ? ` transform="rotate(${k.rot} ${k.x + k.w / 2} ${k.y + k.h / 2})"`
                : "";
              return `<g opacity="${op}"><g${tr}><rect x="${k.x}" y="${k.y}" width="${k.w}" height="${k.h}" rx="4" fill="${k.fill || "#1f6f6b"}" stroke="rgba(255,255,255,.35)" stroke-width="1.5"/><text x="${k.x + k.w / 2}" y="${k.y + k.h / 2 + 4}" text-anchor="middle" fill="rgba(255,255,255,.75)" font-size="11">${k.tag || ""}</text></g></g>`;
            }
            if (k.type === "arrow") {
              const col = k.sel ? "var(--accent-ink)" : "var(--attention)";
              const mk = k.sel ? "url(#ahs)" : "url(#ah)";
              let s = `<g opacity="${op}"><line x1="${k.x1}" y1="${k.y1}" x2="${k.x2}" y2="${k.y2}" stroke="${col}" stroke-width="4" marker-end="${mk}"/>`;
              if (k.bbox) s += this.selBox(k.bbox);
              return s + `</g>`;
            }
            if (k.type === "stroke") {
              const col = k.sel ? "var(--accent-ink)" : "var(--attention)";
              const dash = k.hidden ? ` stroke-dasharray="6 5"` : "";
              return `<path opacity="${op}" d="${k.d}" fill="none" stroke="${col}" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"${dash}/>`;
            }
            if (k.groupbox) {
              const b = k.groupbox;
              return `<rect x="${b.x}" y="${b.y}" width="${b.w}" height="${b.h}" fill="color-mix(in oklab, var(--accent) 10%, transparent)" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="2 3" rx="4"/>`;
            }
            return "";
          },
          selBox(b) {
            const handles = this.corners(b)
              .map(
                (c) =>
                  `<rect x="${c.x - 3}" y="${c.y - 3}" width="6" height="6" fill="var(--accent)"/>`,
              )
              .join("");
            return `<rect x="${b.x}" y="${b.y}" width="${b.w}" height="${b.h}" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="5 4"/>${handles}`;
          },

          refreshIcons() {
            requestAnimationFrame(() => window.lucide?.createIcons());
          },
          init() {
            this.refreshIcons();
            let raf = null;
            new MutationObserver(() => {
              if (raf) return;
              raf = requestAnimationFrame(() => {
                raf = null;
                window.lucide?.createIcons();
              });
            }).observe(document.body, { childList: true, subtree: true });
          },
        }));
      });
    </script>
  </body>
</html>
