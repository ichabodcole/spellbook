<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>grapevine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <!-- Alpine via CDN — grapevine stays no-build (CDN libs only). The watch
         surface is served as a static file by the daemon's /watch route. -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"
      integrity="sha384-l8f0VcPi/M1iHPv8egOnY/15TDwqgbOR1anMIJWvU6nLRgZVLTLSaNqi/TOoT5Fh"
      crossorigin="anonymous"
    ></script>
    <style>
      :root {
        --bg: #0e1410;
        --bg-elev: #141b16;
        --bg-card: #1a2219;
        --line: #28332b;
        --ink: #e7efe9;
        --ink-mute: #8aa093;
        --grape: #7c5cff;
        --grape-soft: #b9a8ff;
        --leaf: #57c97a;
        --leaf-soft: #a6e2b7;
        --warn: #f0b265;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        font-size: 14px;
        line-height: 1.5;
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 16px 24px;
        border-bottom: 1px solid var(--line);
        background: var(--bg-elev);
        display: flex;
        align-items: center;
        gap: 16px;
      }
      header .leaf {
        font-size: 22px;
      }
      header h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }
      header h1 .channel {
        color: var(--leaf-soft);
      }
      header h1 .sep {
        color: var(--ink-mute);
        margin: 0 6px;
      }
      header .topic {
        margin: 0;
        font-size: 13px;
        color: var(--ink-mute);
      }
      header .topic.placeholder {
        font-style: italic;
      }
      .layout {
        flex: 1;
        min-height: 0;
        display: grid;
        grid-template-columns: 220px 1fr 220px;
      }
      main {
        overflow-y: auto;
        padding: 16px 24px 24px;
        scroll-behavior: smooth;
      }
      aside {
        background: var(--bg-elev);
        padding: 16px 18px;
        overflow-y: auto;
      }
      aside.left {
        border-right: 1px solid var(--line);
      }
      aside.right {
        border-left: 1px solid var(--line);
      }
      aside h2 {
        margin: 0 0 8px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--ink-mute);
        font-weight: 600;
      }
      aside ul {
        margin: 0;
        padding: 0;
        list-style: none;
      }
      aside li {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 12px;
        padding: 4px 0;
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--ink);
      }
      aside.right li .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
      }
      aside.left .row {
        display: flex;
        align-items: stretch;
        gap: 2px;
        border-radius: 6px;
        transition: background-color 120ms ease;
      }
      aside.left .row:hover {
        background: var(--bg-card);
      }
      aside.left .row.active {
        background: var(--bg-card);
      }
      aside.left .row.new {
        animation: flash 1.5s ease-out;
      }
      aside.left a {
        flex: 1;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 8px;
        border-radius: 6px;
        color: var(--ink);
        text-decoration: none;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 12px;
        cursor: pointer;
        min-width: 0;
      }
      aside.left .row.active a {
        color: var(--leaf-soft);
        font-weight: 600;
      }
      aside.left a .name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      aside.left a .count {
        font-size: 10px;
        color: var(--ink-mute);
        background: var(--bg);
        border-radius: 999px;
        padding: 1px 6px;
        flex-shrink: 0;
        margin-left: 6px;
      }
      aside.left .row.active a .count {
        color: var(--leaf-soft);
      }
      aside.left .close-btn {
        background: none;
        border: none;
        color: var(--ink-mute);
        cursor: pointer;
        padding: 0 6px;
        opacity: 0;
        transition:
          opacity 120ms ease,
          color 120ms ease;
        font-size: 13px;
        line-height: 1;
        border-radius: 4px;
      }
      aside.left .row:hover .close-btn {
        opacity: 1;
      }
      aside.left .close-btn:hover {
        color: #ff6b6b;
        background: rgba(255, 107, 107, 0.1);
      }
      @keyframes flash {
        0% {
          background: var(--grape);
          color: white;
        }
        100% {
          background: transparent;
        }
      }
      .status {
        position: sticky;
        bottom: 0;
        padding: 8px 12px;
        font-size: 11px;
        color: var(--ink-mute);
        background: var(--bg-elev);
        border-top: 1px solid var(--line);
        font-family: "JetBrains Mono", ui-monospace, monospace;
      }
      .msg {
        margin: 10px 0;
        max-width: 720px;
      }
      .msg .meta {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 4px;
        font-size: 12px;
      }
      .msg .from {
        font-weight: 600;
        font-family: "JetBrains Mono", ui-monospace, monospace;
      }
      .msg .ts {
        color: var(--ink-mute);
        font-size: 11px;
        font-family: "JetBrains Mono", ui-monospace, monospace;
      }
      .msg .body {
        background: var(--bg-card);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 14px;
        white-space: pre-wrap;
        word-wrap: break-word;
      }
      .msg.kind-topic .body {
        background: transparent;
        border: 1px dashed var(--grape);
        color: var(--grape-soft);
        font-style: italic;
      }
      .msg.kind-topic .from {
        color: var(--grape-soft);
      }
      .empty {
        margin: 60px auto;
        text-align: center;
        color: var(--ink-mute);
        max-width: 520px;
      }
      .empty .big {
        font-size: 40px;
        margin-bottom: 12px;
      }
      .pulse {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--leaf);
        margin-right: 6px;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
      }
      .disconnected .pulse {
        background: var(--warn);
      }
    </style>
  </head>
  <body x-data="grapevine">
    <header>
      <span class="leaf">🌿</span>
      <div style="flex: 1">
        <h1>
          grapevine<span class="sep">·</span
          ><span class="channel" x-text="channel">—</span>
        </h1>
        <p
          class="topic"
          :class="{ placeholder: !topic }"
          x-text="topic || 'no topic set'"
        >
          no topic set
        </p>
      </div>
    </header>

    <div class="layout">
      <aside class="left">
        <h2>Channels</h2>
        <ul>
          <li
            x-show="channels.length === 0"
            style="color: var(--ink-mute); font-style: italic; padding: 6px 8px"
          >
            no channels yet
          </li>
          <template x-for="c in channels" :key="c.name">
            <li style="padding: 0">
              <div
                class="row"
                :class="{ active: c.name === channel, new: c.isNew }"
              >
                <a :href="'#' + encodeURIComponent(c.name)">
                  <span class="name" x-text="c.name"></span>
                  <span class="count" x-text="c.subscribers ?? 0"></span>
                </a>
                <button
                  class="close-btn"
                  :title="'Close channel “' + c.name + '” (deletes message log)'"
                  @click.prevent.stop="closeChannel(c.name)"
                >
                  🗑
                </button>
              </div>
            </li>
          </template>
        </ul>
      </aside>

      <main id="stream" x-ref="stream">
        <div class="empty" x-show="messages.length === 0">
          <div class="big">🌿</div>
          <div>Waiting for messages on this channel…</div>
        </div>
        <template x-for="(m, idx) in messages" :key="m.id ?? idx">
          <div class="msg" :class="'kind-' + (m.kind || 'message')">
            <div class="meta">
              <span
                class="from"
                :style="{ color: aliasColor(m.from) }"
                x-text="m.kind === 'topic' ? m.from + ' set topic' : m.from"
              ></span>
              <span class="ts" x-text="fmtTime(m.ts)"></span>
            </div>
            <div class="body" x-text="m.text"></div>
          </div>
        </template>
      </main>

      <aside class="right">
        <h2>On the line</h2>
        <ul>
          <li
            x-show="subscribers.length === 0"
            style="color: var(--ink-mute); font-style: italic"
          >
            no one currently subscribed
          </li>
          <template x-for="a in subscribers" :key="a">
            <li :style="{ color: aliasColor(a) }">
              <span class="dot"></span><span x-text="a"></span>
            </li>
          </template>
        </ul>
      </aside>
    </div>

    <div class="status" :class="{ disconnected }">
      <span class="pulse"></span><span x-text="status">connecting…</span>
    </div>

    <script>
      document.addEventListener("alpine:init", () => {
        Alpine.data("grapevine", () => ({
          // Channel is read from the URL hash so a single static page handles
          // any channel. e.g. /watch#roundtable
          channel:
            decodeURIComponent((location.hash || "#lobby").slice(1)) || "lobby",
          topic: "",
          status: "connecting…",
          disconnected: false,
          messages: [],
          subscribers: [],
          channels: [],
          // Highest message id seen — passed as `since` on (re)connect so a
          // brief SSE drop won't lose messages.
          highest: 0,
          // Names we've already rendered, used to detect channels that arrived
          // between polls so they can be briefly flashed.
          seenChannels: new Set(),
          firstChannelPoll: true,
          es: null,

          init() {
            document.title = `grapevine · ${this.channel}`;
            this.connect();
            this.refreshSubscribers();
            this.refreshChannels();
            // Poll subscribers + channels periodically — `who` is bursty (wait
            // windows open and close) and new channels can be opened by other
            // agents at any time, so we refresh every few seconds for a live
            // feel.
            setInterval(() => this.refreshSubscribers(), 3000);
            setInterval(() => this.refreshChannels(), 3000);
            // If the user changes the hash (or clicks a channel in the left
            // rail), reload to switch channels — the simplest way to reset the
            // SSE stream and the message list cleanly.
            window.addEventListener("hashchange", () => location.reload());
          },

          // Deterministic color per alias — same alias always gets the same hue.
          hashHue(s) {
            let h = 0;
            for (let i = 0; i < s.length; i++)
              h = (h * 31 + s.charCodeAt(i)) | 0;
            return Math.abs(h) % 360;
          },
          aliasColor(alias) {
            return `hsl(${this.hashHue(alias || "")} 70% 70%)`;
          },
          fmtTime(ts) {
            const d = new Date(ts);
            return d.toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit",
              second: "2-digit",
            });
          },

          setTopic(t) {
            this.topic = t || "";
          },

          connect() {
            this.disconnected = false;
            this.status = `connecting to ${this.channel}…`;
            // EventSource handles SSE reconnection natively but doesn't expose
            // a clean retry-from-cursor mechanism, so we pass `since` on each
            // new connection.
            const url = `/channels/${encodeURIComponent(this.channel)}/tail?since=${this.highest}`;
            const es = new EventSource(url);
            this.es = es;
            es.addEventListener("subscribed", (ev) => {
              try {
                const d = JSON.parse(ev.data);
                if (d.topic !== undefined) this.setTopic(d.topic);
                this.status = `subscribed to ${this.channel}`;
              } catch {}
            });
            es.addEventListener("message", (ev) => {
              try {
                const m = JSON.parse(ev.data);
                if (typeof m.id === "number" && m.id > this.highest)
                  this.highest = m.id;
                // Auto-scroll to bottom — but only if the user was already near
                // it (so reading history isn't interrupted). Measure before the
                // push, scroll after the DOM updates.
                const el = this.$refs.stream;
                const nearBottom =
                  el.scrollTop + el.clientHeight + 80 >= el.scrollHeight;
                this.messages.push(m);
                if (m.kind === "topic") this.setTopic(m.text);
                if (nearBottom)
                  this.$nextTick(() => {
                    el.scrollTop = el.scrollHeight;
                  });
              } catch {}
            });
            es.addEventListener("error", () => {
              this.disconnected = true;
              this.status = `disconnected — reconnecting…`;
              es.close();
              setTimeout(() => this.connect(), 1000);
            });
          },

          async refreshSubscribers() {
            try {
              const r = await fetch(
                `/channels/${encodeURIComponent(this.channel)}/subscribers`
              );
              const j = await r.json();
              this.subscribers = j.subscribers || [];
              if (j.topic !== undefined) this.setTopic(j.topic);
            } catch {}
          },

          async refreshChannels() {
            try {
              const r = await fetch(`/channels`);
              const j = await r.json();
              // Rebuild the list, flagging newly-arrived channels with a brief
              // animation so the operator sees "huh, a new channel."
              this.channels = (j.channels || []).map((c) => {
                const isNew =
                  !this.firstChannelPoll && !this.seenChannels.has(c.name);
                this.seenChannels.add(c.name);
                return { name: c.name, subscribers: c.subscribers ?? 0, isNew };
              });
              this.firstChannelPoll = false;
            } catch {}
          },

          async closeChannel(name) {
            const ok = window.confirm(
              `Close channel "${name}"? This deletes its message log and disconnects any subscribers. This cannot be undone.`
            );
            if (!ok) return;
            try {
              await fetch(`/channels/${encodeURIComponent(name)}`, {
                method: "DELETE",
              });
            } catch {}
            this.seenChannels.delete(name);
            this.refreshChannels();
            // If we just closed the channel we were watching, redirect to
            // "lobby" (auto-opened by the server on next subscribe). The
            // hashchange handler reloads.
            if (name === this.channel) location.hash = "lobby";
          },
        }));
      });
    </script>
  </body>
</html>
