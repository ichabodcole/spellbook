<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__TITLE__</title>
    <link rel="icon" href="/assets/favicon.png" type="image/png" />
    <!-- Alpine-over-CDN (the Grapevine tier) — no bundler; the daemon serves
         this single static file. The board is a thin reactive membrane over the
         daemon's WebSocket; the daemon holds canonical state. SRI pinned to the
         same hash grapevine/watch.html uses (Alpine 3.14.1). -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"
      integrity="sha384-l8f0VcPi/M1iHPv8egOnY/15TDwqgbOR1anMIJWvU6nLRgZVLTLSaNqi/TOoT5Fh"
      crossorigin="anonymous"
    ></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #16100b;
        --bg-overlay: radial-gradient(ellipse at top, #1d1610 0%, #16100b 60%);
        --panel: #24190f;
        --panel-doing: #2a1f12;
        --panel-review: #251a2b;
        --panel-done: #1d2128;
        --card: #2d2114;
        --card-hover: #3a2c1d;
        --card-editing: #3f301f;
        --border: #3d2e1f;
        --border-hover: #5e4830;
        --text: #f0e6d4;
        --text-muted: #b09a7c;
        --text-faint: #6e5d44;
        --accent-warm: #d49a55;          /* mammoth gold — "doing" */
        --accent-warm-bg: #3d2e16;
        --accent-warm-text: #f6d49a;
        --accent-cool: #6ba3c8;          /* ice blue — "done", drop hints */
        --accent-cool-bg: #1e2d3a;
        --accent-cool-text: #b3d4e8;
        --accent-review: #b083c8;        /* amethyst — "review" */
        --accent-review-bg: #2e1d36;
        --accent-review-text: #d9bce8;
        --accent-neutral: #8a6f4e;       /* warm brown — "todo" */
        --accent-neutral-bg: #2a2014;
        --accent-neutral-text: #d6c2a3;
        --danger: #d97a73;
        --danger-bg: #3a1a17;
      }
      * { box-sizing: border-box; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        background: var(--bg); color: var(--text);
        background-image: var(--bg-overlay);
        margin: 0; padding: 1.5rem 2rem;
        line-height: 1.5;
        min-height: 100vh;
      }
      [x-cloak] { display: none !important; }
      header { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1.25rem; }
      .brand { display: flex; flex-direction: column; align-items: flex-start; gap: 0.2rem; }
      .brand .wordmark {
        display: block; height: 48px; width: auto;
      }
      .brand h1 {
        font-size: 1rem; margin: 0; font-weight: 500;
        color: var(--text-muted);
        letter-spacing: -0.005em;
      }
      .meta { color: var(--text-muted); font-size: 0.8rem; font-variant-numeric: tabular-nums; text-align: right; }
      .status-dot { display: inline-block; width: 0.55rem; height: 0.55rem; border-radius: 50%; margin-right: 0.4rem; vertical-align: middle; background: #6e5d44; transition: background 0.15s; }
      .status-dot.connected { background: var(--accent-warm); box-shadow: 0 0 6px rgba(212, 154, 85, 0.5); }
      .status-dot.closed { background: var(--danger); }
      .session-id { color: var(--text-faint); }
      .columns {
        display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 1rem;
        max-width: 1200px;
      }
      .column {
        background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
        padding: 0.75rem 0.85rem 1rem;
        min-height: 8rem;
        transition: background 0.15s, border-color 0.15s;
      }
      .column[data-status="doing"] { background: var(--panel-doing); }
      .column[data-status="review"] { background: var(--panel-review); }
      .column[data-status="done"]  { background: var(--panel-done); }
      .column-head {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 0.75rem;
      }
      .column-head h2 {
        margin: 0; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
        color: var(--text-muted); font-weight: 600;
      }
      .column[data-status="doing"] .column-head h2 { color: var(--accent-warm-text); }
      .column[data-status="review"] .column-head h2 { color: var(--accent-review-text); }
      .column[data-status="done"]  .column-head h2 { color: var(--accent-cool-text); }
      .count {
        background: rgba(0,0,0,0.25); border-radius: 999px;
        padding: 0.1rem 0.5rem; font-size: 0.7rem;
        color: var(--text-muted); font-variant-numeric: tabular-nums;
      }
      .task-list { display: flex; flex-direction: column; gap: 0.5rem; }
      .task {
        background: var(--card); border: 1px solid var(--border); border-radius: 6px;
        padding: 0.55rem 0.7rem; cursor: text;
        transition: border-color 0.1s, background 0.1s, transform 0.05s;
        box-shadow: 0 1px 2px rgba(0,0,0,0.2);
      }
      .task:hover { border-color: var(--border-hover); background: var(--card-hover); }
      .task[draggable="true"] { cursor: grab; }
      .task.dragging { opacity: 0.4; cursor: grabbing; }
      .task.drop-before { border-top: 2px solid var(--accent-cool); padding-top: calc(0.55rem - 2px); }
      .task.drop-after  { border-bottom: 2px solid var(--accent-cool); padding-bottom: calc(0.55rem - 2px); }
      .column.drop-target { background: rgba(107, 163, 200, 0.06); border-color: var(--accent-cool); }
      .task-list.empty-drop-zone { min-height: 2.5rem; border: 1px dashed transparent; border-radius: 5px; }
      .column.drop-target .task-list.empty-drop-zone { border-color: var(--accent-cool); }
      .task .title {
        font-size: 0.92rem; word-break: break-word;
        outline: none;
        min-height: 1.2em;
        color: var(--text);
      }
      .task .title[contenteditable="true"]:focus { background: var(--card-editing); border-radius: 3px; padding: 0.1rem 0.3rem; margin: -0.1rem -0.3rem; }
      .task .title:empty::before {
        content: "(empty — type a title)"; color: var(--text-faint); font-style: italic;
      }
      .task .owner {
        /* Plain metadata at the bottom-left — deliberately NOT a pill, so it
           doesn't compete with the status pills just above it. */
        margin-top: 0.45rem;
        font-size: 0.7rem;
        color: var(--accent-neutral-text);
        letter-spacing: 0.01em;
      }
      .task .tags { display: flex; flex-wrap: wrap; gap: 0.25rem; margin-top: 0.4rem; }
      .task .tag {
        /* Neutral chip in the "todo" / warm-brown family — same palette as the
           @owner text, deliberately understated. No per-tag color (the audit
           defers that); every chip the same. A future filter may make it
           clickable — display-only for now. */
        font-size: 0.68rem; padding: 0.1rem 0.45rem; border-radius: 999px;
        background: var(--accent-neutral-bg); color: var(--accent-neutral-text);
        border: 1px solid var(--border); letter-spacing: 0.01em;
      }
      /* A blocked task: a faint danger rail + a de-emphasized body, plus a small
         "blocked by N" cue under the title. Convention-only — the board still
         lets it move (no hard lock). */
      .task.blocked { border-left: 2px solid var(--danger); opacity: 0.82; }
      .task .blocked-cue {
        display: inline-flex; align-items: center; gap: 0.25rem;
        margin-top: 0.3rem; font-size: 0.7rem; font-weight: 500;
        color: var(--danger);
      }
      .task .notes {
        font-size: 0.78rem; color: var(--text-muted); margin-top: 0.25rem; white-space: pre-wrap;
        /* Clamp to 2 lines so a long note can't bloat the card; the full text
           lives in the detail modal. Clickable — a dedicated affordance that
           doesn't fight drag-to-move or the inline title edit. */
        display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2;
        -webkit-box-orient: vertical; overflow: hidden; cursor: pointer;
      }
      .task .notes:hover { color: var(--text); }
      .task-actions {
        display: flex; gap: 0.3rem; margin-top: 0.5rem; flex-wrap: wrap; align-items: center;
      }
      .pill {
        font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 999px;
        cursor: pointer; border: 1px solid var(--border); background: rgba(0,0,0,0.2); color: var(--text-muted);
        user-select: none; transition: all 0.1s;
      }
      .pill:hover { border-color: var(--border-hover); color: var(--text); }
      .pill.active.todo  { background: var(--accent-neutral-bg); border-color: var(--accent-neutral); color: var(--accent-neutral-text); }
      .pill.active.doing { background: var(--accent-warm-bg);    border-color: var(--accent-warm);    color: var(--accent-warm-text); }
      .pill.active.review { background: var(--accent-review-bg);  border-color: var(--accent-review);  color: var(--accent-review-text); }
      .pill.active.done  { background: var(--accent-cool-bg);    border-color: var(--accent-cool);    color: var(--accent-cool-text); }
      .delete {
        font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 4px;
        cursor: pointer; border: none; background: transparent; color: var(--text-faint);
        margin-left: auto;
      }
      .delete:hover { color: var(--danger); }
      /* The always-present detail affordance (opens the modal — works for a
         no-notes card too). Sits with the pills; delete keeps margin-left:auto
         and stays on the far right. */
      .detail {
        font-size: 0.85rem; line-height: 1; padding: 0.15rem 0.4rem; border-radius: 4px;
        cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-faint);
      }
      .detail:hover { border-color: var(--border-hover); color: var(--text); }
      /* ── detail modal (#19): plain overlay + panel in the existing palette ── */
      .modal-overlay {
        position: fixed; inset: 0; z-index: 50; padding: 1rem;
        background: rgba(0, 0, 0, 0.55);
        display: flex; align-items: center; justify-content: center;
      }
      .modal {
        width: min(520px, 100%); background: var(--panel);
        border: 1px solid var(--border-hover); border-radius: 10px;
        padding: 1.1rem 1.2rem; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        display: flex; flex-direction: column; gap: 0.7rem;
      }
      .modal-title { margin: 0; font-size: 1rem; color: var(--text); word-break: break-word; }
      .modal-label {
        font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted);
      }
      .modal-notes {
        width: 100%; resize: vertical; min-height: 7rem;
        background: var(--bg); color: var(--text);
        border: 1px solid var(--border); border-radius: 6px;
        padding: 0.5rem 0.6rem; font: inherit; font-size: 0.85rem; line-height: 1.45;
      }
      .modal-notes:focus { outline: none; border-color: var(--border-hover); }
      .modal-actions { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 0.2rem; }
      .modal-actions button {
        font-size: 0.8rem; padding: 0.35rem 0.9rem; border-radius: 6px; cursor: pointer;
        border: 1px solid var(--border); background: rgba(0, 0, 0, 0.2); color: var(--text-muted);
      }
      .modal-actions button.ghost:hover { border-color: var(--border-hover); color: var(--text); }
      .modal-actions button.primary {
        background: var(--accent-warm); border-color: var(--accent-warm); color: #1a1207; font-weight: 600;
      }
      .modal-actions button.primary:hover { background: #e4ab66; }
      .add-row { display: flex; gap: 0.4rem; margin-top: 0.75rem; }
      .add-row input {
        flex: 1; background: rgba(0,0,0,0.25); color: var(--text);
        border: 1px solid var(--border); border-radius: 5px;
        padding: 0.35rem 0.55rem; font-size: 0.85rem; font-family: inherit;
      }
      .add-row input::placeholder { color: var(--text-faint); }
      .add-row input:focus { border-color: var(--accent-warm); outline: none; }
      .add-row button {
        background: var(--card); color: var(--text-muted); border: 1px solid var(--border);
        border-radius: 5px; padding: 0.35rem 0.7rem; cursor: pointer; font-size: 0.85rem;
      }
      .add-row button:hover { border-color: var(--accent-warm); color: var(--accent-warm-text); }
      .footer {
        display: flex; gap: 0.5rem; margin-top: 1.5rem; align-items: center; max-width: 1200px;
      }
      .footer .spacer { flex: 1; }
      .footer .ambient {
        width: 36px; height: 36px;
        background-image: url("/assets/mascot.webp");
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0.35;
        margin-right: 0.4rem;
      }
      .footer button {
        border: 1px solid var(--border); border-radius: 6px;
        padding: 0.5rem 1.1rem; font-size: 0.9rem; cursor: pointer;
        background: var(--card); color: var(--text); font-family: inherit;
      }
      .footer button.primary { background: var(--accent-warm); border-color: var(--accent-warm); color: #1a1207; font-weight: 600; }
      .footer button.primary:hover { background: #e4ab66; }
      .footer button.danger { background: transparent; color: var(--danger); border-color: var(--danger-bg); }
      .footer button.danger:hover { background: var(--danger-bg); }
      .empty-state {
        display: none;
        text-align: center;
        padding: 4rem 1rem;
        color: var(--text-faint);
        max-width: 1200px;
      }
      .columns.is-empty + .empty-state { display: block; }
      .empty-state .hero {
        width: 200px; height: 200px;
        margin: 0 auto 1rem;
        background-image: url("/assets/mascot-large.webp"), linear-gradient(135deg, transparent 0%, rgba(212, 154, 85, 0.04) 100%);
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0.7;
      }
      .empty-state p { font-size: 0.95rem; }
      .toasts { position: fixed; right: 1rem; bottom: 1rem; display: flex; flex-direction: column; gap: 0.4rem; z-index: 100; }
      .toast {
        background: var(--card); border: 1px solid var(--accent-warm); border-radius: 6px;
        padding: 0.55rem 0.85rem; font-size: 0.85rem; max-width: 22rem;
        color: var(--text);
        box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        animation: fadein 0.15s ease-out;
      }
      @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }
      .ended { opacity: 0.6; pointer-events: none; }
    </style>
  </head>
  <body x-data="board" :class="{ ended }" x-cloak>
    <header>
      <div class="brand">
        <img class="wordmark" src="/assets/wordmark.webp" alt="Bounty Board" />
        <h1 x-text="title">__TITLE__</h1>
      </div>
      <div class="meta">
        <span><span class="status-dot" :class="conn"></span><span x-text="statusText"></span></span>
        <div class="session-id"><code>__SESSION_ID__</code></div>
      </div>
    </header>

    <div class="columns" :class="{ 'is-empty': tasks.length === 0 }">
      <template x-for="col in COLUMNS" :key="col.status">
        <section
          class="column"
          :data-status="col.status"
          @dragover="onDragOver(col.status, $event, $el)"
          @dragleave="onDragLeave($event, $el)"
          @drop="onDrop(col.status, $event, $el)"
        >
          <div class="column-head">
            <h2 x-text="col.label"></h2>
            <span class="count" x-text="tasksByStatus(col.status).length"></span>
          </div>
          <div class="task-list empty-drop-zone">
            <template x-for="(task, idx) in tasksByStatus(col.status)" :key="task.id">
              <div
                class="task"
                :class="{ blocked: blockedCount(task) > 0 }"
                :data-task-id="task.id"
                :data-task-status="task.status"
                draggable="true"
                @dragstart="onDragStart(task, $event, $el)"
                @dragend="onDragEnd($el)"
              >
                <div
                  class="title"
                  contenteditable="true"
                  spellcheck="false"
                  x-text="task.title"
                  @mousedown="$el.closest('.task').setAttribute('draggable', 'false')"
                  @blur="onTitleBlur(task, $el)"
                  @keydown.enter.prevent="$el.blur()"
                  @keydown.escape="$el.textContent = task.title; $el.blur()"
                ></div>
                <template x-if="blockedCount(task) > 0">
                  <div
                    class="blocked-cue"
                    x-text="'⛔ blocked by ' + blockedCount(task)"
                  ></div>
                </template>
                <template x-if="task.notes">
                  <!-- x-text only (untrusted string). Clamped to 2 lines; click
                       opens the detail modal for the full note + editing. -->
                  <div
                    class="notes"
                    x-text="task.notes"
                    @click="openDetail(task)"
                    title="View / edit description"
                  ></div>
                </template>
                <div class="task-actions">
                  <template x-for="s in STATUSES" :key="s">
                    <span
                      class="pill"
                      :class="task.status === s ? 'active ' + s : ''"
                      x-text="s"
                      @click="toggle(task, s)"
                    ></span>
                  </template>
                  <button
                    class="detail"
                    @click="openDetail(task)"
                    title="Details / edit description"
                  >⋯</button>
                  <button class="delete" @click="remove(task)">delete</button>
                </div>
                <template x-if="task.tags && task.tags.length">
                  <div class="tags">
                    <template x-for="tag in task.tags" :key="tag">
                      <!-- x-text only — tags are untrusted strings (XSS guard) -->
                      <span class="tag" x-text="tag"></span>
                    </template>
                  </div>
                </template>
                <template x-if="task.owner">
                  <div class="owner" x-text="'@' + task.owner"></div>
                </template>
              </div>
            </template>
          </div>
          <div class="add-row">
            <input
              type="text"
              placeholder="Add a task…"
              x-model="drafts[col.status]"
              @keydown.enter.prevent="addTask(col.status)"
            />
            <button @click="addTask(col.status)">Add</button>
          </div>
        </section>
      </template>
    </div>

    <div class="empty-state">
      <div class="hero" aria-hidden="true"></div>
      <p>No tasks yet — add one below, or wait for the agent to drop some in.</p>
    </div>

    <div class="footer">
      <div class="ambient" aria-hidden="true"></div>
      <div class="spacer"></div>
      <button class="primary" @click="closeBoard()">Close board</button>
    </div>

    <div class="toasts">
      <template x-for="t in toasts" :key="t.id">
        <div class="toast" x-text="t.text"></div>
      </template>
    </div>

    <!-- Detail modal (#19): full title + editable description. Closes on
         Save / Cancel / Esc / click-outside. title via x-text, the editable
         field is a value-bound <textarea> — never x-html. -->
    <template x-if="detail">
      <div
        class="modal-overlay"
        @click.self="closeDetail()"
        @keydown.escape.window="closeDetail()"
      >
        <div class="modal" role="dialog" aria-modal="true">
          <h3 class="modal-title" x-text="detail.title"></h3>
          <label class="modal-label" for="detail-notes">Description</label>
          <textarea
            id="detail-notes"
            class="modal-notes"
            rows="7"
            x-model="detailNotes"
            x-init="$nextTick(() => $el.focus())"
            placeholder="No description yet — add one…"
          ></textarea>
          <div class="modal-actions">
            <button class="ghost" @click="closeDetail()">Cancel</button>
            <button class="primary" @click="saveDetail()">Save</button>
          </div>
        </div>
      </div>
    </template>

    <script>
      // Server substitutes __WS_URL__ with JSON.stringify(url), which produces a
      // fully-quoted JS string literal — do NOT add quotes here.
      const WS_URL = __WS_URL__;

      document.addEventListener("alpine:init", () => {
        Alpine.data("board", () => ({
          // Local mirror of the board. The daemon is the source of truth; we
          // re-render reactively on every WS message. (Same contract the old
          // vanilla surface used — this is a view-layer port, not a protocol
          // change.)
          title: "",
          tasks: [],
          drafts: { todo: "", doing: "", review: "", done: "" },
          toasts: [],
          conn: "", // status-dot modifier: "" | "connected" | "closed"
          ended: false,
          socket: null,
          closedByServer: false,
          toastSeq: 0,
          dragId: null, // id of the task currently being dragged
          detail: null, // task open in the detail modal, or null (#19)
          detailNotes: "", // editable description buffer (separate from the task)
          STATUSES: ["todo", "doing", "review", "done"],
          COLUMNS: [
            { status: "todo", label: "To do" },
            { status: "doing", label: "Doing" },
            { status: "review", label: "Review" },
            { status: "done", label: "Done" },
          ],

          get statusText() {
            return this.conn === "connected"
              ? "connected"
              : this.conn === "closed"
                ? "closed"
                : "connecting…";
          },

          init() {
            // Seed the title from the server-substituted <title> (plain text —
            // no quoting risk, unlike inlining __TITLE__ into a JS expression).
            // The WS `init` message overrides it with canonical state shortly.
            this.title = document.title;
            this.connect();
          },

          tasksByStatus(status) {
            return this.tasks.filter((t) => t.status === status);
          },

          // How many of a task's blockers are still live (exist + not done). 0 =
          // not blocked. A deleted or done blocker doesn't block (matches the
          // daemon's isBlocked).
          blockedCount(task) {
            return (task.blockedBy || []).filter((bid) => {
              const b = this.tasks.find((t) => t.id === bid);
              return b && b.status !== "done";
            }).length;
          },

          // ── outgoing ────────────────────────────────────────────────
          send(msg) {
            if (!this.socket || this.socket.readyState !== WebSocket.OPEN) return;
            this.socket.send(JSON.stringify(msg));
          },
          randId() {
            const buf = new Uint8Array(6);
            crypto.getRandomValues(buf);
            return "u-" + Array.from(buf, (b) => b.toString(16).padStart(2, "0")).join("");
          },
          addTask(status) {
            const title = (this.drafts[status] || "").trim();
            if (!title) return;
            this.send({ type: "task.add", task: { id: this.randId(), title, status } });
            this.drafts[status] = "";
          },
          toggle(task, status) {
            if (task.status === status) return;
            this.send({ type: "task.toggle", id: task.id, status });
          },
          remove(task) {
            this.send({ type: "task.remove", id: task.id });
          },
          // ── detail modal (#19) ──────────────────────────────────────
          openDetail(task) {
            this.detail = task;
            this.detailNotes = task.notes || ""; // buffer — don't mutate the task
          },
          closeDetail() {
            this.detail = null;
            this.detailNotes = "";
          },
          saveDetail() {
            if (!this.detail) return;
            const next = this.detailNotes;
            // Send only on change; "" is a valid clear. Same task.edit verb the
            // inline title edit uses — the daemon re-sanitizes + broadcasts.
            if (next !== (this.detail.notes || "")) {
              this.send({ type: "task.edit", id: this.detail.id, notes: next });
            }
            this.closeDetail();
          },
          onTitleBlur(task, el) {
            el.closest(".task").setAttribute("draggable", "true");
            const next = el.textContent.trim();
            if (next === "") {
              // Revert empty edits — the daemon rejects them and the visible
              // text would otherwise diverge from canonical state.
              el.textContent = task.title;
              return;
            }
            if (next !== task.title) {
              this.send({ type: "task.edit", id: task.id, title: next });
            }
          },
          closeBoard() {
            // Dismiss the board. Non-destructive — the agent already has every
            // change live and the daemon snapshots canonical state, so this just
            // ends the session (the agent can reopen with `cli.ts open --restore`).
            if (confirm("Close this board? The agent can reopen it later from a snapshot.")) {
              this.send({ type: "close" });
            }
          },

          // ── drag-and-drop (transient hints are imperative DOM, faithful to
          //    the vanilla surface; the drop emits a single task.move) ──────
          clearDropMarkers() {
            for (const el of document.querySelectorAll(".task.drop-before, .task.drop-after")) {
              el.classList.remove("drop-before", "drop-after");
            }
            for (const el of document.querySelectorAll(".column.drop-target")) {
              el.classList.remove("drop-target");
            }
          },
          onDragStart(task, e, el) {
            if (el.getAttribute("draggable") !== "true") {
              e.preventDefault();
              return;
            }
            el.classList.add("dragging");
            try { e.dataTransfer.setData("text/plain", task.id); } catch {}
            e.dataTransfer.effectAllowed = "move";
            this.dragId = task.id;
          },
          onDragEnd(el) {
            el.classList.remove("dragging");
            this.clearDropMarkers();
            this.dragId = null;
          },
          onDragOver(status, e, column) {
            if (!this.dragId) return;
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";
            this.clearDropMarkers();
            column.classList.add("drop-target");
            const list = column.querySelector(".task-list");
            const cards = Array.from(list.querySelectorAll(".task:not(.dragging)"));
            const dropOn = cards.find((t) => {
              const r = t.getBoundingClientRect();
              return e.clientY < r.top + r.height / 2;
            });
            if (dropOn) dropOn.classList.add("drop-before");
            else if (cards.length > 0) cards[cards.length - 1].classList.add("drop-after");
          },
          onDragLeave(e, column) {
            if (!column.contains(e.relatedTarget)) {
              column.classList.remove("drop-target");
              for (const el of column.querySelectorAll(".task.drop-before, .task.drop-after")) {
                el.classList.remove("drop-before", "drop-after");
              }
            }
          },
          onDrop(status, e, column) {
            if (!this.dragId) return;
            e.preventDefault();
            const list = column.querySelector(".task-list");
            const cards = Array.from(list.querySelectorAll(".task:not(.dragging)"));
            let index = cards.length; // default: end of column
            for (let i = 0; i < cards.length; i++) {
              const r = cards[i].getBoundingClientRect();
              if (e.clientY < r.top + r.height / 2) {
                index = i;
                break;
              }
            }
            const id = this.dragId;
            this.clearDropMarkers();
            this.dragId = null;
            this.send({ type: "task.move", id, status, index });
          },

          // ── toasts ──────────────────────────────────────────────────
          toast(text) {
            const id = ++this.toastSeq;
            this.toasts.push({ id, text });
            setTimeout(() => {
              this.toasts = this.toasts.filter((t) => t.id !== id);
            }, 5000);
          },

          // ── incoming WS messages ────────────────────────────────────
          applyInit(msg) {
            this.title = msg.title || "";
            this.tasks = Array.isArray(msg.tasks) ? msg.tasks.slice() : [];
            if (this.title) document.title = this.title;
          },
          applyAdd(msg) {
            if (this.tasks.some((t) => t.id === msg.task.id)) return;
            this.tasks.push(msg.task);
          },
          applyUpdate(msg) {
            const idx = this.tasks.findIndex((t) => t.id === msg.id);
            if (idx === -1) return;
            this.tasks[idx] = Object.assign({}, this.tasks[idx], msg.patch);
          },
          applyRemove(msg) {
            const idx = this.tasks.findIndex((t) => t.id === msg.id);
            if (idx === -1) return;
            this.tasks.splice(idx, 1);
          },
          endSession() {
            this.closedByServer = true;
            this.ended = true;
          },

          connect() {
            this.conn = "";
            this.socket = new WebSocket(WS_URL);
            this.socket.onopen = () => { this.conn = "connected"; };
            this.socket.onclose = () => {
              this.conn = "closed";
              if (!this.closedByServer) setTimeout(() => this.connect(), 1000);
            };
            this.socket.onerror = () => { /* surfaces via close */ };
            this.socket.onmessage = (ev) => {
              let msg;
              try { msg = JSON.parse(ev.data); } catch { return; }
              if (msg.type === "init") this.applyInit(msg);
              else if (msg.type === "task.add") this.applyAdd(msg);
              else if (msg.type === "task.update") this.applyUpdate(msg);
              else if (msg.type === "task.remove") this.applyRemove(msg);
              else if (msg.type === "message") {
                // The uniform session-end signal: a "session ended: <reason>"
                // toast precedes the socket close (any reason — user dismiss,
                // idle timeout, agent close).
                this.toast(msg.text);
                if (msg.text && msg.text.startsWith("session ended:")) this.endSession();
              }
            };
          },
        }));
      });
    </script>
  </body>
</html>
